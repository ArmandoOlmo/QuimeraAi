
[functions.send-invite-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-invite-email/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-invite-email/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-invite-email/*.html" ]

[functions.stripe-api]
enabled = true
verify_jwt = true
entrypoint = "./functions/stripe-api/index.ts"

[functions.storefront-api]
enabled = true
verify_jwt = true
entrypoint = "./functions/storefront-api/index.ts"

[functions.stripe-webhook]
enabled = true
verify_jwt = false
entrypoint = "./functions/stripe-webhook/index.ts"

[functions.email-api]
enabled = true
verify_jwt = false
entrypoint = "./functions/email-api/index.ts"

[functions.create-public-restaurant-reservation]
enabled = true
verify_jwt = false
entrypoint = "./functions/create-public-restaurant-reservation/index.ts"
