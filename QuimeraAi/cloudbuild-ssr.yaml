options:
  substitutionOption: 'ALLOW_LOOSE'

substitutions:
  _VITE_SUPABASE_URL: ''
  _VITE_SUPABASE_ANON_KEY: ''
  _VITE_AI_PROXY_URL: ''
  _VITE_VIDEO_PROXY_URL: ''

steps:
  # Step 1: Build Docker image using Dockerfile.ssr
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.ssr'
      - '-t'
      - 'gcr.io/$PROJECT_ID/quimera-ssr'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'VITE_AI_PROXY_URL=${_VITE_AI_PROXY_URL}'
      - '--build-arg'
      - 'VITE_VIDEO_PROXY_URL=${_VITE_VIDEO_PROXY_URL}'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/quimera-ssr'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'quimera-ssr'
      - '--image'
      - 'gcr.io/$PROJECT_ID/quimera-ssr'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/quimera-ssr'

timeout: '1800s'
